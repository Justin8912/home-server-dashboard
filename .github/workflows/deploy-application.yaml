name: Deploy Application

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    deploy_application:
        name: Deploy Docker Image
        runs-on: ubuntu-latest
        steps:
            - name: Authenticate with DockerHub
              uses: docker/login-action@v1
              with:
                username: "justin8912"
                password: ${{ secrets.DOCKERHUB_PAT}}
        
            - name: Upload image
              uses: bash
              run: |
                docker build . -t justin8912/home-server-dashboard
                docker push justin8912/home-server-dashboard:latest
